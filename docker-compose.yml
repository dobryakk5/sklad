services:
  redis:
    image: redis:latest
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sklad
      POSTGRES_USER: sklad_user
      POSTGRES_PASSWORD: change_me_strong_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sklad-next:
    image: node:20
    restart: unless-stopped
    working_dir: /app
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://alfasklad.ru/api}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    volumes:
      - /var/www/sklad/frontend:/app
      - next_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"

volumes:
  redis_data:
  postgres_data:
  next_node_modules:
