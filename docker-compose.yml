services:
  redis:
    image: redis:latest
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sklad
      POSTGRES_USER: sklad_user
      POSTGRES_PASSWORD: change_me_strong_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sklad-next:
    image: node:20
    restart: unless-stopped
    working_dir: /app
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://alfasklad.ru/api}
      NEXT_PUBLIC_CABINET_URL: ${NEXT_PUBLIC_CABINET_URL:-https://lk.alfasklad.ru/}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://alfasklad.ru/}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - /var/www/sklad/frontend:/app
      - next_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
             npm --workspace @alfasklad/site run build &&
             npm --workspace @alfasklad/site run start -- --hostname 0.0.0.0 --port 3000"

  sklad-cabinet:
    image: node:20
    restart: unless-stopped
    working_dir: /app
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://alfasklad.ru/}
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:3001:3001"
    volumes:
      - /var/www/sklad/frontend:/app
      - cabinet_node_modules:/app/node_modules
    command: >
      sh -c "npm install --include=dev &&
             npm --workspace @alfasklad/cabinet run build &&
             npm --workspace @alfasklad/cabinet run start -- --hostname 0.0.0.0"

volumes:
  redis_data:
  postgres_data:
  next_node_modules:
  cabinet_node_modules:
