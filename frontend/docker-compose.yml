services:
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data

  sklad-next:
    image: node:20
    container_name: sklad-next
    restart: unless-stopped
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    volumes:
      - /var/www/sklad/frontend:/app
      - next_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"

volumes:
  redis-data:
  next_node_modules: